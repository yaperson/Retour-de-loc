<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Impression Mobile</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 1rem; }
    img { max-width: 100%; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 5px; }
    h1, h2 { text-align: center; }
    #btnImprimer, #btnRetour {
      display: block;
      margin: 1rem auto;
      padding: 0.5rem 1rem;
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="print-container">Chargement...</div>

  <button id="btnImprimer">🖨️ Imprimer</button>
  <button id="btnRetour" onclick="window.history.back()">⬅ Retour</button>

  <script>
    const html = sessionStorage.getItem('printContent') || '<p>Contenu non disponible.</p>';
    const container = document.getElementById('print-container');
    container.innerHTML = html;

    const printBtn = document.getElementById('btnImprimer');
    const retourBtn = document.getElementById('btnRetour');

    printBtn.addEventListener('click', async () => {
      // Attendre que toutes les images soient bien chargées avant impression
      const images = [...document.images];
      await Promise.all(images.map(img =>
        img.complete ? Promise.resolve() :
        new Promise(res => img.onload = img.onerror = res)
      ));

      window.print();
    });

    // Optionnel : Masquer le bouton Imprimer après impression
    window.onafterprint = () => {
      printBtn.style.display = 'none';
      retourBtn.style.display = 'block';
    };
  </script>
</body>
</html>
