<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="./assets/icons/192.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json" />
    <title>Contrôle Matériel Médical</title>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('Service Worker enregistré', registration);

                // 🔄 Surveille les mises à jour
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    if (!newWorker) return;

                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                // ✅ Nouvelle version prête
                                showUpdateNotification();
                            }
                        }
                    });
                });
            }).catch(err => {
                console.error('Erreur lors de l’enregistrement du Service Worker :', err);
            });
        }

        function showUpdateNotification() {
            const banner = document.createElement('div');
            banner.style.position = 'fixed';
            banner.style.bottom = '0';
            banner.style.left = '0';
            banner.style.right = '0';
            banner.style.background = '#333';
            banner.style.color = 'white';
            banner.style.padding = '1rem';
            banner.style.display = 'flex';
            banner.style.justifyContent = 'space-between';
            banner.style.alignItems = 'center';
            banner.style.zIndex = '9999';
            banner.innerHTML = `
                <span>🔄 Nouvelle version disponible</span>
                <button style="padding:0.5rem 1rem; background:#00c853; color:white; border:none; border-radius:4px; cursor:pointer;">
                    Mettre à jour
                </button>
            `;

            banner.querySelector('button').addEventListener('click', () => {
                window.location.reload(); // Recharge l'app avec la nouvelle version
            });

            document.body.appendChild(banner);
        }

    </script>
</head>

<body>
    <header>
        <h1>Contrôle Matériel Médical</h1>
        
        <p>Mode de maintenance : </p>
        <div class="maintenance_mode">
            <button id="maintenance_mode_standard" class="selected">Standard</button>
            <button id="maintenance_mode_home">Domicile</button>
            <button id="maintenance_mode_sav">SAV</button>
        </div>
    </header>

    <!-- <div class="standard_maintenance_mode">
        
    </div> -->

    <main>
    <div class="home_maintenance_mode home_maintenance_mode__container">
        <label for="clientName">Nom du patient</label>
        <input type="text" name="" id="clientName">

        <label for="clientAddress">Adresse</label>
        <input type="text" id="clientAddress">
        <ul id="clientAddressSuggestions" class="suggestions"></ul>

        <label for="latestPositioningAcquisition">Date d'aquisition matelas ou coussin</label>
        <input type="month" min="2012-01" id="latestPositioningAcquisition">
    </div>

    <div class="sav_maintenance_mode sav_maintenance_mode__container">
        <label for="clientNameSav">Nom de l'usager</label>
        <input type="text" name="" id="clientNameSav">
    </div>

    <div class="container">
    <button id="btnScan">📷 Scanner code-barres</button>
    <button id="endScan" title="Arreter le scan">✖️</button>

    <div id="scanner"></div>

    <label for="serial_number">Numéro de série</label>
    <input type="text" id="serial_number">

    <label for="typeMateriel">Choisir le type de matériel :</label>
    <select id="typeMateriel" required>
        <option value="">-- Sélectionner --</option>
        <option value="lit">Lit médicalisé</option>
        <option value="fauteuil_manuel">Fauteuil roulant manuel</option>
        <option value="fauteuil_electrique">Fauteuil roulant électrique</option>
        <option value="leve_personne">Lève-personne / verticalisateur</option>
        <option value="pompe_nutrition">Pompe de nutrition</option>
        <option value="autre">Autre</option>
    </select>

    <div id="questionsContainer" class="questions"></div>

    <div class="notes_container" id="notes_container">
        <label for="notes">Notes :</label>
        <textarea name="notes" id="notes"></textarea>
    </div>

    <div id="photosContainer" style="margin-top:1.5rem; display:none;">
        <label>Photo de l'ensemble :</label>
        <input type="file" accept="image/*" capture="environment" id="photoEnsemble" />
        <img id="previewEnsemble" class="preview" alt="Aperçu photo ensemble" />

        <label>Photo de l'étiquette (n° de série) :</label>
        <input type="file" accept="image/*" capture="environment" id="photoEtiquette" />
        <img id="previewEtiquette" class="preview" alt="Aperçu photo étiquette" />
    </div>


    <div class="sav_maintenance_mode">
        <label>Photo details :</label>
        <input type="file" accept="image/*" capture="environment" id="photoDetails" />
        <img id="previewDetails" class="preview" alt="Aperçu photo étiquette" />
    </div>

    <div class="home_maintenance_mode">
        <h3>Signature du patient</h3>
        <canvas id="signatureCanvas" width="300" height="150" style="border:1px solid #ccc; border-radius:5px;"></canvas>
        <button id="clearSignature">Effacer la signature</button>
    </div>
    </div>


    <button id="btnSummary" disabled>Voir résumé & Partager</button>

</main>

    <!-- Modale résumé -->
    <div id="modal">
        <div>
            <button id="closeModal" title="Fermer la fenêtre">✖️</button>
            <div id="modalContent"></div>
            <div style="text-align:center; margin-top:1.5rem;">
                <button id="btnModalPrint">🖨️ Imprimer</button>
                <button id="btnModalDownload">⬇️ Télécharger</button>
                <button id="btnModalMail">📧 Envoyer par mail</button>
                <button id="btnModalShare">📤 Partager</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
