<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Impression Mobile</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 1rem; }
    img { max-width: 50vw; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 5px; }
    h1, h2 { text-align: center; }
    #btnRetour { display: none; margin-top: 2rem; padding: 0.5rem 1rem; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="print-container">Chargement...</div>
  <button id="btnRetour" onclick="window.history.back()">⬅ Retour</button>

  <script>
    const html = sessionStorage.getItem('printContent') || '<p>Contenu non disponible.</p>';
    document.getElementById('print-container').innerHTML = html;

    const images = [...document.images];
    Promise.all(images.map(img =>
      img.complete ? Promise.resolve() :
      new Promise(res => img.onload = img.onerror = res)
    )).then(() => {
      window.print();

      // Après impression, afficher le bouton retour
      document.getElementById('btnRetour').style.display = 'block';
    });
  </script>
</body>
</html>
